DOMAIN-SUFFIX,googleapis.com,🚀 自动优选
DOMAIN-SUFFIX,gstatic.com,🚀 自动优选

RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/36dc0b65d7ed9eec2d61a449038843da3ec72db0/rule/Shadowrocket/OpenAI/OpenAI.list,🤖 AI 服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/36dc0b65d7ed9eec2d61a449038843da3ec72db0/rule/Shadowrocket/Claude/Claude.list,🤖 AI 服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/36dc0b65d7ed9eec2d61a449038843da3ec72db0/rule/Shadowrocket/Gemini/Gemini.list,🤖 AI 服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/36dc0b65d7ed9eec2d61a449038843da3ec72db0/rule/Shadowrocket/Copilot/Copilot.list,🤖 AI 服务

# 4. Google通用基础设施（地图/统计/YouTube视频CDN等）——不专属于AI，走自动优选
